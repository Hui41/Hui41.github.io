<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>{{ page.title }}</title>

<!-- MathJax -->
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>

<style>
/* ===== 页面基础 ===== */
html {
  font-size: 16px;
  line-height: 1.7;
  font-family: 'Open Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 0;
  padding: 0;
}

body {
  display: flex;
  min-height: 100vh;
  margin: 0;
}

/* ===== 左列：目录 ===== */
.toc {
  flex: 0 0 250px; 
  background-color: #f5f5f5; /* 左列灰白 */
  padding: 20px;
  box-sizing: border-box;
  color: #f5f5f5;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}

.toc h3 {
  margin-top: 0;
  color: #333;
}

.toc ul {
  list-style: none;
  padding: 0;
}

.toc li {
  margin-bottom: 10px;
}

.toc a {
  color: #333;
  text-decoration: none;
  font-size: 16px;
}

.toc a:hover {
  text-decoration: underline;
  color: #111;
}

/* ===== 右列：日记正文 ===== */
.content {
  flex: 1;
  background: #d0f0fd; /* 右列浅色 */
  padding: 30px;
  box-sizing: border-box;
  overflow-x: hidden;
}

/* 页面主标题 */
.content h1.page-title {
  text-align: center;
  margin-top: 0;
  margin-bottom: 30px;
  font-size: 2em;
  color: #222;
}

/* 日记内容段落样式 */
.content h3 {
  margin-top: 30px;
  margin-bottom: 10px;
  color: #222;
}

.content p, .content li {
  margin: 10px 0;
}

/* 日期样式 */
.date {
  font-size: 0.9em;
  color: #555;
  margin-bottom: 10px;
}

/* 脚注样式 */
.footnote {
  font-size: 0.85em;
  color: #555;
  margin-top: 10px;
}
</style>
</head>

<body>
  <!-- 左侧目录 -->
  <div class="toc">
    <h3>目录</h3>
    <ul id="toc-list"></ul>
  </div>

  <!-- 日记内容 -->
  <div class="content">
    <h1 class="page-title">日记</h1>
    {{ content }}
  </div>

<!-- JS 动态生成 TOC -->
<script>
document.addEventListener("DOMContentLoaded", function() {
  const tocList = document.getElementById("toc-list");
  document.querySelectorAll(".content h3").forEach(h3 => {
    if (!h3.id) {
      h3.id = h3.textContent.trim().toLowerCase().replace(/\s+/g, '-');
    }
    const li = document.createElement("li");
    const a = document.createElement("a");
    a.href = "#" + h3.id;
    a.textContent = h3.textContent;
    li.appendChild(a);
    tocList.appendChild(li);
  });
});
</script>
</body>
</html>
