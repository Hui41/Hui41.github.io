<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>{{ page.title }}</title>

<!-- MathJax 支持公式 -->
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- 样式 -->
<style>
html {
  overflow-x: initial !important;
  font-size: 14px;
  background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
  color: var(--text-color);
  font-family: 'Open Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  -webkit-font-smoothing: antialiased;
}

:root {
  --bg-color: #ffffff;
  --text-color: #333333;
  --select-text-bg-color: #B5D6FC;
  --select-text-font-color: auto;
  --monospace: "Lucida Console", Consolas, "Courier", monospace;
  --title-bar-height: 20px;
}

.container {
  width: 80%;
  margin: auto;
  overflow: hidden;
}

.content {
  padding: 20px;
  background: #f5f5f5;
  margin-top: 20px;
  border-radius: 10px;
}

a {
  color: #00a0a0;
  text-decoration: none;
}

a:hover {
  color: #29c3a9;
}

h1, h2, h3 {
  margin-top: 0;
  margin-bottom: 10px;
}

p, li {
  margin: 8px 0;
}

.entry {
  margin-bottom: 30px;
  padding: 15px;
  border-left: 6px solid #b6a4af;
  border-right: 6px solid #4ECDC4;
  background-color: rgba(255, 255, 255, 0.85);
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  border-radius: 8px;
}

.date {
  font-size: 0.9em;
  color: #555555;
  margin-bottom: 10px;
}

nav {
  background-color: #778899;
  overflow: hidden;
  text-align: center;
  padding: 10px 0;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

nav a {
  color: Black;
  padding: 14px 20px;
  display: inline-block;
  font-size: 18px;
  transition: background-color 0.3s, color 0.3s;
}

nav a:hover {
  background-color: #29c3a9;
  color: #ffcc00;
}

@media (max-width: 768px) {
  .container { width: 95%; }
}

@media (max-width: 480px) {
  .container { width: 95%; }
}
</style>
</head>

<body>

<!-- 导航 -->
<nav>
  <a href="{{ "/" | relative_url }}">首页</a>
  <a href="{{ "/about" | relative_url }}">关于</a>
  <a href="{{ "/contact" | relative_url }}">联系</a>
</nav>

<div class="container">
  <h1>{{ page.title }}</h1>

  <!-- 单篇文章内容 -->
  <div class="content">
    {{ content }}
  </div>

  <!-- 返回首页链接 -->
  <p><a href="{{ "/" | relative_url }}">返回首页</a></p>
</div>

</body>
</html>
