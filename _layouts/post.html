<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>{{ page.title }}</title>

<!-- MathJax -->
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>

<style>
html {
  font-size: 14px;
  background: #d0f0fd; /* 背景颜色，可修改 */
  color: var(--text-color);
  font-family: 'Open Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

:root {
  --text-color: #333333;
}

body {
  margin: 0;
  padding: 0;
}

.container {
  display: flex;
  max-width: 95%;
  margin: 20px auto;
  gap: 20px;
}

/* 左侧目录 */
.toc {
  flex: 0 0 200px; /* 固定宽度 */
  position: sticky;
  top: 20px;
  background-color: rgba(255,255,255,0.85);
  padding: 10px;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.toc h3 {
  margin-top: 0;
}

.toc ul {
  list-style: none;
  padding: 0;
}

.toc li {
  margin-bottom: 8px;
}

.toc a {
  text-decoration: none;
  color: #007bff;
}

.toc a:hover {
  text-decoration: underline;
}

/* 内容区 */
.content {
  flex: 1;
}

/* 每条日记独立方框 */
.entry {
  padding: 15px;
  margin-bottom: 20px;
  border-left: 6px solid #b6a4af;
  border-right: 6px solid #4ECDC4;
  background-color: rgba(255, 255, 255, 0.85);
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  border-radius: 8px;
}

h1 {
  text-align: center;
  margin-top: 0;
}

.date {
  font-size: 0.9em;
  color: #555555;
  margin-bottom: 10px;
}
</style>
</head>

<body>
<div class="container">

  <!-- 左侧目录 -->
  <div class="toc">
    <h3>目录</h3>
    <ul>
      {% assign headers = page.content | markdownify | split:'<h3>' %}
      {% for header in headers %}
        {% if header contains '</h3>' %}
          {% assign title = header | split:'</h3>' | first %}
          <li><a href="#{{ title | strip_html | slugify }}">{{ title | strip_html }}</a></li>
        {% endif %}
      {% endfor %}
    </ul>
  </div>

  <!-- 日记内容 -->
  <div class="content">
    {{ content }}
  </div>

</div>
</body>
</html>
