<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>{{ page.title }}</title>

<!-- MathJax -->
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>

<style>
/* ===== 页面基础 ===== */
html {
  font-size: 16px; /* 字体稍大 */
  line-height: 1.7; /* 行距稍大 */
  background: #d0f0fd; /* 页面背景颜色，可修改 */
  color: #333;
  font-family: 'Open Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
  margin: 0;
  padding: 0;
}

.container {
  display: flex;
  max-width: 95%;
  margin: 20px auto;
  gap: 20px;
}

/* ===== 左侧目录 ===== */
.toc {
  flex: 0 0 200px; /* 固定宽度 */
  position: sticky;
  top: 20px;
  background-color: rgba(255,255,255,0.85);
  padding: 10px;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.toc h3 {
  margin-top: 0;
}

.toc ul {
  list-style: none;
  padding: 0;
}

.toc li {
  margin-bottom: 8px;
}

.toc a {
  text-decoration: none;
  color: #007bff;
  font-size: 16px; /* 目录字体稍大 */
}

.toc a:hover {
  text-decoration: underline;
}

/* ===== 内容区 ===== */
.content {
  flex: 1;
}

/* ===== 每条日记独立方框 ===== */
.entry {
  padding: 20px; /* 内边距稍大 */
  margin-bottom: 25px; /* 日记间距略大 */
  background-color: rgba(255, 255, 255, 0.85);
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  border-radius: 8px;
}

/* 段落间距 */
.entry p, .entry li {
  margin: 10px 0; /* 段落间距稍大 */
}

/* 日期样式 */
.date {
  font-size: 0.9em;
  color: #555;
  margin-bottom: 10px;
}

/* 脚注样式 */
.footnote {
  font-size: 0.85em;
  color: #555;
  margin-top: 10px;
}

</style>
</head>

<body>
<div class="container">

  <!-- 左侧目录 -->
  <div class="toc">
    <h3>目录</h3>
    <ul id="toc-list"></ul>
  </div>

  <!-- 日记内容 -->
  <div class="content">
    {{ content }}
  </div>

</div>

<!-- ===== JS 动态生成 TOC ===== -->
<script>
document.addEventListener("DOMContentLoaded", function() {
  const tocList = document.getElementById("toc-list");
  document.querySelectorAll(".content h3").forEach(h3 => {
    if (!h3.id) {
      h3.id = h3.textContent.trim().toLowerCase().replace(/\s+/g, '-');
    }
    const li = document.createElement("li");
    const a = document.createElement("a");
    a.href = "#" + h3.id;
    a.textContent = h3.textContent;
    li.appendChild(a);
    tocList.appendChild(li);
  });
});
</script>
</body>
</html>
