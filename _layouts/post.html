<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>{{ page.title }}</title>

<!-- MathJax 支持公式 -->
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>

<style>
html {
  overflow-x: initial !important;
  font-size: 14px;
  /* 背景颜色，可修改 */
  background: #d0f0fd;
  color: var(--text-color);
  font-family: 'Open Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  -webkit-font-smoothing: antialiased;
}

:root {
  --text-color: #333333;
}

.container {
  width: 80%;
  margin: auto;
  overflow: hidden;
}

.content {
  padding: 20px;
  background: rgba(255, 255, 255, 0.85); /* 半透明白底 */
  margin-top: 20px;
  border-radius: 10px;
}

h1 {
  text-align: center;
}

a {
  color: #00a0a0;
  text-decoration: none;
}

a:hover {
  color: #29c3a9;
}

.date {
  font-size: 0.9em;
  color: #555555;
  margin-bottom: 10px;
}
</style>
</head>

<body>
<div class="container">
  <h1>{{ page.title }}</h1>

  <!-- 单篇文章内容 -->
  <div class="content">
    {{ content }}
  </div>
</div>
</body>
</html>
