<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>{{ page.title }}</title>
<script type="text/javascript" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>
<style>
  body { font-family: "Segoe UI", sans-serif; max-width: 800px; margin: auto; padding: 20px; line-height: 1.6; background: #f9f9f9; }
  h1 { text-align: center; }
  .date { color: #555; font-size: 0.9em; text-align: center; margin-bottom: 20px; }
  .content { margin-top: 20px; }
  a { color: #007bff; text-decoration: none; }
</style>
</head>
<body>
  <h1>{{ page.title }}</h1>
  <div class="date">{{ page.date | date: "%Y-%m-%d" }}</div>
  <div class="content">
    {{ content }}
  </div>
  <p><a href="{{ "/" | relative_url }}">返回首页</a></p>
</body>
</html>
